# Kashi FX lexicon (Faz 6 P3) — curated word→effect-category mapping.
#
# v1.2 additions DRAFT pending Caner's async curation (Faz 6.5 P4;
# kararı 6: Claude drafts, Caner approves — rejected-candidate rationale in
# docs/lexicon-expansion-playbook.md's round notes).
#
# Matching rules (pipeline/semantics.py):
#   keywords_*  — EXACT full-word match after normalization (any length).
#   stems_*     — PREFIX match, minimum 4 chars (Turkish agglutination:
#                 "patl" catches patlama/patlıyor/patlamasında; stems are
#                 chosen BEFORE vowel narrowing / consonant softening).
#   prototypes_* — short sentences embedded once per worker start; lines
#                 not covered by keywords are matched against these
#                 centroids with a conservative per-language threshold.
# icon: Material Symbols name (monochrome, fill=currentColor — Caner kararı 5);
#       verified/vendored at P4, names here are the draft intent.
# base_intensity: 0..1 — client scales effect strength from this.
version: kashi-fx/1.2.0

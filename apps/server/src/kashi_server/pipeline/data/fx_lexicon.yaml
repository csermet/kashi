    icon: bomb
    base_intensity: 0.9
    keywords_en: [bomb, bombs, boom, dynamite, tnt, explosion, explosions]
    stems_en: [explod, blast]
    keywords_tr: [bomba, dinamit]
    stems_tr: [patl]
    prototypes_en:
      - everything blows up like a bomb
      - an explosion tears through the night
    prototypes_tr:
      - her şey bomba gibi patlıyor
      - geceyi bir patlama sarsıyor

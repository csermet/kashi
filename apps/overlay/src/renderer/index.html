<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; style-src 'self' 'unsafe-inline'; img-src https: data:"
    />
    <title>Kashi</title>
    <style>
      html,
      body {
        margin: 0;
        height: 100%;
        background: transparent;
        overflow: hidden;

        user-select: none;
      }
      #drag-region {
        height: 100%;
        display: grid;
        place-items: center;
        -webkit-app-region: drag;
      }
      .lyric {
        color: #fff;
        font-size: 28px;
        font-weight: 600;
        text-shadow: 0 1px 8px rgba(0, 0, 0, 0.8);
      }
    </style>
  </head>
  <body>
    <div id="drag-region">
      <div class="lyric" id="lyric-line">Kashi overlay — skeleton</div>
    </div>
    <script type="module" src="./src/main.ts"></script>

</html>

<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <!-- style-src keeps 'unsafe-inline' ONLY for vite dev-mode style
         injection; the BUILD strips the token (tightenCsp plugin) — packaged
         apps ship the strict CSP. -->
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; style-src 'self' 'unsafe-inline'; img-src https: data:"
    />
    <title>Kashi</title>
    <link rel="stylesheet" href="./src/style.css" />
  </head>
  <body>
    <div id="stage">
      <div id="lyric-box">
        <div class="lyric dim" id="lyric-line">Kashi</div>
        <div id="search-line" hidden>
          <span class="search-label">lyrics</span>
          <span class="dot"></span>
          <span class="dot"></span>
          <span class="dot"></span>
        </div>
        <div id="offset-flash" aria-hidden="true"></div>
      </div>
    </div>
    <script type="module" src="./src/main.ts"></script>
  </body>
</html>

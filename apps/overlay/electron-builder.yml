# Packaging (Faz 5 P5). Builds run per-platform in CI (release-overlay.yml);
# locally: pnpm dist:linux / dist:win. 26.x pinned — 27 is alpha (native ESM
# breaking wave); electron-updater deliberately absent (backlog: releases are
# manual downloads until the release rhythm settles).
appId: com.railguncnr.kashi
productName: Kashi
directories:
  output: release
files:
  - out/**
  - package.json
extraResources:
  # tray.ts falls back to <resources>/tray.png when app.isPackaged — the
  # ?asset import only resolves when running from the repo (see tray.ts NOTE).
  - from: resources/tray.png
    to: tray.png
asar: true
npmRebuild: false # no native deps (ws runs pure-JS; bufferutil not installed)
publish: null # CI attaches artifacts to the GitHub release itself
# macOS: ad-hoc sign the packed .app (Apple Silicon rejects unsigned code as
# "damaged"). No-op on win/linux. See build/after-pack.cjs.
afterPack: build/after-pack.cjs
win:
  target:
    - nsis
    - portable
  artifactName: ${productName}-${version}-win-${arch}.${ext}
nsis:
  oneClick: true
  deleteAppDataOnUninstall: false
linux:
  target:
    - AppImage
    - deb
  category: AudioVideo
  maintainer: Caner Sermet <canersermet@gmail.com>
  artifactName: ${productName}-${version}-linux-${arch}.${ext}
mac:
  # Apple Silicon (M2) is the target — the CI runner is arm64. AD-HOC signed
  # (build/after-pack.cjs), NOT notarized (no Apple Developer account). arm64
  # rejects a TRULY unsigned app as "damaged"; ad-hoc signing fixes that, and
  # the only user step left is clearing the download quarantine:
  #   xattr -cr /Applications/Kashi.app
  # (documented in the README). Notarization stays out of scope.
  target:
    - dmg
    - zip # zip is the friendlier path (dmg quarantines harder)
  category: public.app-category.music
  # electron-builder's OWN signing stays off (no cert); after-pack.cjs does
  # the ad-hoc `codesign --sign -` on the packed .app instead.
  identity: null
  artifactName: ${productName}-${version}-mac-${arch}.${ext}

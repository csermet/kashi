# Weekly yt-dlp canary: metadata-only extraction against a stable video.
# Full downloads are deliberately avoided — GitHub runner IPs are frequently
# bot-checked, which would make the canary cry wolf. If even metadata-only
# proves flaky here, move this to a homelab CronJob + ntfy instead.
name: yt-dlp canary

on:
  schedule:
    - cron: '40 4 * * 1' # Mondays 04:40 UTC
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  canary:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/server
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - run: uv sync
      - name: Metadata-only extraction
        run: PYTHONPATH=src uv run python -m kashi_server.pipeline.download dQw4w9WgXcQ /tmp/canary --simulate
      - name: File an issue on failure (deduped)
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const title = 'yt-dlp canary failed';
            const open = await github.rest.issues.listForRepo({
              owner: context.repo.owner, repo: context.repo.repo,
              state: 'open', labels: 'canary',
            });
            if (open.data.some(i => i.title === title)) return;
            await github.rest.issues.create({
              owner: context.repo.owner, repo: context.repo.repo,
              title,
              labels: ['canary'],
              body: 'Weekly metadata-only extraction failed — likely a YouTube-side change. ' +
                    'Check the run: ' + context.serverUrl + '/' + context.repo.owner + '/' +
                    context.repo.repo + '/actions/runs/' + context.runId +
                    '\n\nPlaybook: bump the yt-dlp pin (stable first, nightly as break-glass), rebuild, redeploy.',
            });

# Packaged overlay releases (Faz 5 P5). Trigger: push an overlay-v* tag.
# Linux builds AND smoke-tests the AppImage headless (the workspace-dep
# bundle trap — @kashi/protocol resolving to TS source — only bites at
# RUNTIME, so packaging alone proves nothing). Windows builds nsis+portable
# natively (wine cross-builds are fragile). Both jobs upload artifacts; ONE
# release job attaches everything to a single DRAFT release (two parallel
# softprops calls race into duplicate drafts — reviewer catch). Caner
# reviews and publishes.
name: overlay-release

on:
  push:
    tags: ['overlay-v*']

permissions:
  contents: write

jobs:
  linux:
    runs-on: ubuntu-latest
    env:
      ELECTRON_SKIP_BINARY_DOWNLOAD: '1' # electron-builder fetches its own dist
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22.23.1
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: node scripts/check-versions.mjs
      - run: pnpm --filter kashi-overlay dist:linux
      - name: Headless smoke (bundle trap + startup)
        run: |
          sudo apt-get update -q && sudo apt-get install -y -q xvfb
          APPIMAGE=$(ls apps/overlay/release/*.AppImage)
          chmod +x "$APPIMAGE"
          # --appimage-extract-and-run: ubuntu-24.04 runners ship no libfuse2,
          # so a mounted run dies at dlopen (seen on intel too). env scrub:
          # with ELECTRON_RUN_AS_NODE=1 leaked in, packaged Electron runs as
          # plain node and rejects its own flags.
          env -u ELECTRON_RUN_AS_NODE xvfb-run -a \
            "$APPIMAGE" --appimage-extract-and-run --no-sandbox > smoke.log 2>&1 &
          APP_PID=$!
          sleep 12
          if ! kill -0 "$APP_PID" 2>/dev/null; then
            echo "::error::packaged app died within 12s"; cat smoke.log; exit 1
          fi
          kill "$APP_PID" || true
          if grep -q "ERR_MODULE_NOT_FOUND" smoke.log; then
            echo "::error::workspace dep resolved to source (bundle trap)"; cat smoke.log; exit 1
          fi
          if ! grep -q "ws on 127.0.0.1" smoke.log; then
            echo "::error::ws-server never came up"; cat smoke.log; exit 1
          fi
          tail -20 smoke.log
      - name: Checksums
        run: |
          cd apps/overlay/release
          sha256sum *.AppImage *.deb > SHA256SUMS-linux.txt
          cat SHA256SUMS-linux.txt
      - uses: actions/upload-artifact@v4
        with:
          name: overlay-linux
          path: |
            apps/overlay/release/*.AppImage
            apps/overlay/release/*.deb
            apps/overlay/release/SHA256SUMS-linux.txt
          if-no-files-found: error

  windows:
    runs-on: windows-latest
    env:
      ELECTRON_SKIP_BINARY_DOWNLOAD: '1'
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22.23.1
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: node scripts/check-versions.mjs
      - run: pnpm --filter kashi-overlay dist:win
      - name: Checksums
        shell: bash
        run: |
          cd apps/overlay/release
          sha256sum *.exe > SHA256SUMS-windows.txt
          cat SHA256SUMS-windows.txt
      - uses: actions/upload-artifact@v4
        with:
          name: overlay-windows
          path: |
            apps/overlay/release/*.exe
            apps/overlay/release/SHA256SUMS-windows.txt
          if-no-files-found: error

  macos:
    # macos-latest is Apple Silicon (arm64) — matches the M2 target. UNSIGNED:
    # CSC_IDENTITY_AUTO_DISCOVERY=false stops electron-builder hunting for a
    # cert, so the build never fails for lack of one (identity:null in the yml
    # is the belt, this is the braces).
    runs-on: macos-latest
    env:
      ELECTRON_SKIP_BINARY_DOWNLOAD: '1'
      CSC_IDENTITY_AUTO_DISCOVERY: 'false'
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22.23.1
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: node scripts/check-versions.mjs
      - run: pnpm --filter kashi-overlay dist:mac
      - name: Checksums
        run: |
          cd apps/overlay/release
          shasum -a 256 *.dmg *.zip > SHA256SUMS-macos.txt
          cat SHA256SUMS-macos.txt
      - uses: actions/upload-artifact@v4
        with:
          name: overlay-macos
          path: |
            apps/overlay/release/*.dmg
            apps/overlay/release/*.zip
            apps/overlay/release/SHA256SUMS-macos.txt
          if-no-files-found: error

  release:
    needs: [linux, windows, macos]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true
          path: dist
      - uses: softprops/action-gh-release@v2
        with:
          draft: true
          files: dist/*

name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  ts:
    name: TypeScript (contracts, extension, overlay)
    runs-on: ubuntu-latest
    env:
      # electron-vite builds don't execute Electron; skip the ~100MB binary.
      ELECTRON_SKIP_BINARY_DOWNLOAD: '1'
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22.23.1
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Validate schema fixtures
        run: pnpm --filter @kashi/schemas validate
      - name: Codegen drift check
        run: |
          pnpm --filter @kashi/schemas codegen
          git diff --exit-code -- packages/schemas/src/generated
      - run: pnpm typecheck
      - run: pnpm build

  python:
    name: Python (server)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/server
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: kashi
          POSTGRES_PASSWORD: kashi
          POSTGRES_DB: kashi
        ports: ['5432:5432']
        options: >-
          --health-cmd "pg_isready -U kashi -d kashi"
          --health-interval 5s --health-timeout 3s --health-retries 12
    env:
      DATABASE_URL: postgresql+psycopg://kashi:kashi@localhost:5432/kashi
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - run: uv sync
      - run: uv run ruff check .
      - run: uv run pyright
      - run: uv run alembic upgrade head
      - run: uv run pytest -q


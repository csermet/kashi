# The alignment smoke test with the REAL model (torch CPU + the
# ctc-forced-aligner C++ build). Too heavy for every PR: runs on server
# changes to main, weekly, and on demand.
name: Python alignment smoke

on:
  push:
    branches: [main]
    paths: ['apps/server/**']
  schedule:
    - cron: '20 4 * * 1' # Mondays 04:20 UTC
  workflow_dispatch:

jobs:
  align-smoke:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/server
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - name: Cache the HF models (~1.7 GB — MMS + e5-small)
        uses: actions/cache@v4
        with:
          path: ~/.cache/huggingface
          key: hf-mms-300m-e5-small-v2
      - run: sudo apt-get update && sudo apt-get install -y --no-install-recommends g++ ffmpeg
      - run: uv sync --extra align --extra semantics
      - run: uv run pytest -q -m slow --override-ini addopts=''
